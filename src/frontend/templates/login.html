<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Email Search — Log In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="page-label">AI Email Search Log in</div>
  <div class="container">
    <div class="login-card">
      <h1>AI Email Search</h1>
      <p class="subtitle">Click your way to clarity.</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password">
      </div>

      <button class="btn-primary" onclick="window.location.href='/chat'">Log In</button>
    </div>
  </div>
</body>
</html>
